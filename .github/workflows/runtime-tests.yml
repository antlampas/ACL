name: Runtime tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-runtime:
    name: Python ${{ matrix.python-version }} on Linux
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and runtime test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,sql,config]"

      - name: Compile Python modules
        run: python -m compileall -q src tests

      - name: Run test suite
        run: python -m pytest -q
